name: DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4   # updated

    - name: Set up Java
      uses: actions/setup-java@v4   # updated
      with:
        distribution: 'temurin'     # ✅ REQUIRED
        java-version: '17'

    - name: Build with Maven
      run: mvn clean package

    - name: Build Docker Image
      run: docker build -t demo-app .
